<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOL-ACT 관리자 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"JetBrains Mono"', '"Fira Code"', 'Consolas', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; }
    body { background: #0f172a; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .stat-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .feed-item { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .student-row { cursor: pointer; transition: background 0.15s ease; }
    .student-row:hover { background: #1e293b !important; }
    .status-pending { color: #fbbf24; }
    .status-submitted { color: #38bdf8; }
    .status-graded { color: #4ade80; }
    table { border-collapse: separate; border-spacing: 0; }
    .tab-active { border-bottom: 2px solid #38bdf8; color: #38bdf8; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #94a3b8; }
    .tab-inactive:hover { color: #cbd5e1; }

    /* Sidebar nav */
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      color: #94a3b8; transition: background 0.15s, color 0.15s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: #1e293b; color: #e2e8f0; }
    .nav-item.active { background: #0ea5e9/10; color: #38bdf8; background-color: rgba(14,165,233,0.12); }
    .nav-item.active .nav-icon { color: #38bdf8; }

    /* Page sections */
    .page { display: none; }
    .page.active { display: block; }

    /* Slideshow styles */
    .slideshow-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: #0f172a;
      display: none; opacity: 0;
      transition: opacity 0.6s ease;
    }
    .slideshow-overlay.active { display: flex; opacity: 1; }
    .slideshow-overlay.fade-out { opacity: 0; }

    .slideshow-slide {
      width: 100%; height: 100%;
      display: none; opacity: 0;
      transition: opacity 0.5s ease;
      align-items: center; justify-content: center;
      flex-direction: column; padding: 3rem;
    }
    .slideshow-slide.visible { display: flex; opacity: 1; }

    .auto-badge {
      position: fixed; top: 12px; right: 12px; z-index: 110;
      background: #0ea5e9; color: #fff;
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 4px;
      letter-spacing: 1px;
      display: none; opacity: 0;
      transition: opacity 0.4s ease;
    }
    .auto-badge.visible { display: block; opacity: 1; }

    .ss-stat-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 2rem; width: 100%; max-width: 900px;
    }
    @media (min-width: 1024px) { .ss-stat-grid { grid-template-columns: repeat(4, 1fr); } }
    .ss-stat-card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 12px; padding: 2.5rem; text-align: center;
    }
    .ss-stat-label { font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.5rem; }
    .ss-stat-value { font-size: 3.5rem; font-weight: 800; line-height: 1.1; }

    .ss-feed-list { width: 100%; max-width: 800px; }
    .ss-feed-item {
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      padding: 0.75rem 1rem; border-bottom: 1px solid #1e293b;
    }
    .ss-feed-item.shown { opacity: 1; transform: translateY(0); }

    .ss-student-card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 16px; padding: 3rem; text-align: center;
      width: 100%; max-width: 700px;
    }
    .ss-student-name { font-size: 2.5rem; font-weight: 800; color: #f1f5f9; margin-bottom: 1.5rem; }
    .ss-student-meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem; }
    .ss-meta-item { background: #0f172a; border-radius: 8px; padding: 1.25rem; }
    .ss-meta-label { font-size: 0.75rem; color: #64748b; margin-bottom: 0.25rem; }
    .ss-meta-value { font-size: 1.75rem; font-weight: 700; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Top Bar -->
  <header class="sticky top-0 z-40 bg-slate-900/95 border-b border-slate-700 backdrop-blur flex-shrink-0">
    <div class="px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-2 h-2 rounded-full bg-emerald-400 pulse-dot"></div>
        <h1 class="text-lg font-bold text-slate-100 tracking-tight">SOL-ACT 관리자</h1>
        <span class="text-xs px-2 py-0.5 rounded bg-emerald-900 text-emerald-300 border border-emerald-700">No-Auth</span>
      </div>
      <div class="flex items-center gap-4">
        <span id="lastRefresh" class="text-xs text-slate-500">--</span>
        <button onclick="refreshAll()" id="refreshBtn"
          class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 border border-slate-600 rounded text-xs text-slate-300 transition-colors flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          새로고침
        </button>
      </div>
    </div>
  </header>

  <!-- Body: Sidebar + Content -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-52 flex-shrink-0 bg-slate-900 border-r border-slate-800 flex flex-col py-4 px-3 gap-1 overflow-y-auto">
      <button class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
        <svg class="w-4 h-4 nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        대시보드
      </button>

      <button class="nav-item" onclick="navigate('students')" id="nav-students">
        <svg class="w-4 h-4 nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        학생 현황
      </button>

      <button class="nav-item" onclick="navigate('activity')" id="nav-activity">
        <svg class="w-4 h-4 nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        활동 피드
      </button>

      <button class="nav-item" onclick="navigate('invites')" id="nav-invites">
        <svg class="w-4 h-4 nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
        초대 코드
      </button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto">
      <div class="max-w-[1600px] mx-auto px-6 py-6">

        <!-- Page: Dashboard -->
        <div id="page-dashboard" class="page active space-y-6">
          <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">학원 전체 통계</h2>
          <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-7 gap-3">
            <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
              <div class="text-xs text-slate-500 mb-1">학생 수</div>
              <div id="statStudents" class="text-2xl font-bold text-sky-400">--</div>
            </div>
            <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
              <div class="text-xs text-slate-500 mb-1">강사 수</div>
              <div id="statTeachers" class="text-2xl font-bold text-violet-400">--</div>
            </div>
            <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
              <div class="text-xs text-slate-500 mb-1">원장</div>
              <div id="statDirectors" class="text-2xl font-bold text-amber-400">--</div>
            </div>
            <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
              <div class="text-xs text-slate-500 mb-1">전체 수업</div>
              <div id="statLessons" class="text-2xl font-bold text-emerald-400">--</div>
            </div>
            <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
              <div class="text-xs text-slate-500 mb-1">미완료 과제</div>
              <div id="statPending" class="text-2xl font-bold text-yellow-400">--</div>
            </div>
            <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
              <div class="text-xs text-slate-500 mb-1">제출 과제</div>
              <div id="statSubmitted" class="text-2xl font-bold text-sky-300">--</div>
            </div>
            <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
              <div class="text-xs text-slate-500 mb-1">포트폴리오</div>
              <div id="statPortfolios" class="text-2xl font-bold text-pink-400">--</div>
            </div>
          </div>

          <div>
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">실시간 활동 피드</h2>
            <div class="bg-slate-800 border border-slate-700 rounded-lg">
              <div id="activityFeedDash" class="max-h-96 overflow-y-auto p-4 space-y-1">
                <div class="text-sm text-slate-500 text-center py-8">데이터를 불러오는 중...</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Page: Students -->
        <div id="page-students" class="page">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">학생별 상세 현황</h2>
            <div class="flex items-center gap-2">
              <input id="studentSearch" type="text" placeholder="이름 검색..."
                oninput="filterStudents()"
                class="px-3 py-1.5 bg-slate-900 border border-slate-600 rounded text-xs text-slate-300 focus:outline-none focus:border-sky-500 w-48">
              <span id="studentCount" class="text-xs text-slate-500"></span>
            </div>
          </div>
          <div class="bg-slate-800 border border-slate-700 rounded-lg overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full text-xs">
                <thead>
                  <tr class="bg-slate-900 text-slate-400 uppercase tracking-wider">
                    <th class="px-4 py-3 text-left font-medium">이름</th>
                    <th class="px-4 py-3 text-left font-medium">이메일</th>
                    <th class="px-4 py-3 text-left font-medium">반</th>
                    <th class="px-4 py-3 text-center font-medium">과제(대기)</th>
                    <th class="px-4 py-3 text-center font-medium">과제(제출)</th>
                    <th class="px-4 py-3 text-center font-medium">과제(채점)</th>
                    <th class="px-4 py-3 text-center font-medium">출석률</th>
                    <th class="px-4 py-3 text-center font-medium">포트폴리오</th>
                  </tr>
                </thead>
                <tbody id="studentTableBody">
                  <tr><td colspan="8" class="px-4 py-8 text-center text-slate-500">데이터를 불러오는 중...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Page: Activity -->
        <div id="page-activity" class="page">
          <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">실시간 활동 피드</h2>
          <div class="bg-slate-800 border border-slate-700 rounded-lg">
            <div id="activityFeedFull" class="p-4 space-y-1">
              <div class="text-sm text-slate-500 text-center py-8">데이터를 불러오는 중...</div>
            </div>
          </div>
        </div>

        <!-- Page: Invite Codes -->
        <div id="page-invites" class="page">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">초대 코드</h2>
            <div class="flex items-center gap-2">
              <select id="inviteRoleFilter" onchange="filterInviteCodes()"
                class="px-3 py-1.5 bg-slate-900 border border-slate-600 rounded text-xs text-slate-300 focus:outline-none focus:border-sky-500">
                <option value="">전체 역할</option>
                <option value="student">수강생</option>
                <option value="teacher">강사</option>
                <option value="director">원장</option>
              </select>
              <select id="inviteUsedFilter" onchange="filterInviteCodes()"
                class="px-3 py-1.5 bg-slate-900 border border-slate-600 rounded text-xs text-slate-300 focus:outline-none focus:border-sky-500">
                <option value="">전체 상태</option>
                <option value="unused">미사용</option>
                <option value="used">사용됨</option>
              </select>
              <span id="inviteCount" class="text-xs text-slate-500"></span>
            </div>
          </div>
          <div class="bg-slate-800 border border-slate-700 rounded-lg overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full text-xs">
                <thead>
                  <tr class="bg-slate-900 text-slate-400 uppercase tracking-wider">
                    <th class="px-4 py-3 text-left font-medium">코드</th>
                    <th class="px-4 py-3 text-center font-medium">역할</th>
                    <th class="px-4 py-3 text-center font-medium">상태</th>
                    <th class="px-4 py-3 text-left font-medium">사용자</th>
                    <th class="px-4 py-3 text-left font-medium">메모</th>
                    <th class="px-4 py-3 text-left font-medium">생성일</th>
                  </tr>
                </thead>
                <tbody id="inviteTableBody">
                  <tr><td colspan="6" class="px-4 py-8 text-center text-slate-500">데이터를 불러오는 중...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Slideshow AUTO badge -->
  <div id="autoBadge" class="auto-badge">AUTO</div>

  <!-- Slideshow Overlay -->
  <div id="slideshowOverlay" class="slideshow-overlay">
    <div id="ssSlide0" class="slideshow-slide">
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-widest mb-8">학원 전체 통계</h2>
      <div class="ss-stat-grid" id="ssStatsGrid"></div>
    </div>
    <div id="ssSlide1" class="slideshow-slide">
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-widest mb-8">실시간 활동 피드</h2>
      <div class="ss-feed-list" id="ssFeedList"></div>
    </div>
    <div id="ssSlide2" class="slideshow-slide">
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-widest mb-8">학생 스포트라이트</h2>
      <div class="ss-student-card" id="ssStudentCard"></div>
    </div>
  </div>

  <script>
    // ========================================================================
    // Configuration
    // ========================================================================
    const BASE_URL = '';
    const REFRESH_INTERVAL = 30000;
    let refreshTimer = null;

    // ========================================================================
    // State
    // ========================================================================
    let state = {
      stats: null,
      students: [],
      activity: [],
      inviteCodes: [],
      expandedStudent: null,
      studentDetails: {},
      currentPage: 'dashboard',
      slideshowActive: false,
      slideshowStep: 0,
      idleTimer: null,
      slideshowTimer: null,
      studentSpotlightIndex: 0,
    };

    // ========================================================================
    // Navigation
    // ========================================================================
    function navigate(page) {
      state.currentPage = page;

      // Update nav items
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('nav-' + page).classList.add('active');

      // Update pages
      document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');

      // Render the page's content
      if (page === 'dashboard') { renderStats(); renderActivityFeed('activityFeedDash'); }
      if (page === 'students') renderStudentTable();
      if (page === 'activity') renderActivityFeed('activityFeedFull');
      if (page === 'invites') renderInviteCodes();
    }

    // ========================================================================
    // API Helpers
    // ========================================================================
    async function apiFetch(path) {
      try {
        const res = await fetch(`${BASE_URL}${path}`);
        if (!res.ok) throw new Error(`API error ${res.status}`);
        return await res.json();
      } catch (err) {
        console.error(`[API] ${path}:`, err.message);
        return null;
      }
    }

    // ========================================================================
    // Data Fetching
    // ========================================================================
    async function fetchAllData() {
      const [stats, students, activity, inviteCodes] = await Promise.all([
        apiFetch('/api/admin/stats'),
        apiFetch('/api/admin/students'),
        apiFetch('/api/admin/activity'),
        apiFetch('/api/admin/invite-codes'),
      ]);

      if (stats) state.stats = stats;
      if (students) state.students = students;
      if (activity) state.activity = activity;
      if (inviteCodes) state.inviteCodes = inviteCodes;
    }

    async function fetchStudentDetail(studentId) {
      const data = await apiFetch(`/api/admin/students/${studentId}`);
      if (data) state.studentDetails[studentId] = data;
      return data;
    }

    // ========================================================================
    // Rendering: Stats
    // ========================================================================
    function renderStats() {
      if (!state.stats) return;
      const s = state.stats;
      document.getElementById('statStudents').textContent = s.students ?? '--';
      document.getElementById('statTeachers').textContent = s.teachers ?? '--';
      document.getElementById('statDirectors').textContent = s.directors ?? '--';
      document.getElementById('statLessons').textContent = s.lessons_total ?? '--';
      document.getElementById('statPending').textContent = s.assignments_pending ?? '--';
      document.getElementById('statSubmitted').textContent = s.assignments_submitted ?? '--';
      document.getElementById('statPortfolios').textContent = s.portfolios ?? '--';
    }

    // ========================================================================
    // Rendering: Activity Feed
    // ========================================================================
    function renderActivityFeed(containerId) {
      const feed = document.getElementById(containerId);
      if (!feed) return;
      const items = state.activity || [];

      if (items.length === 0) {
        feed.innerHTML = '<div class="text-sm text-slate-500 text-center py-8">활동 내역이 없습니다</div>';
        return;
      }

      feed.innerHTML = items.map(item => {
        const [icon, iconColor] = activityIcon(item.type);
        return `
          <div class="feed-item flex items-start gap-3 py-2 px-2 rounded hover:bg-slate-700/50">
            <span class="flex-shrink-0 w-5 text-center ${iconColor}">${icon}</span>
            <div class="flex-1 min-w-0">
              <div class="text-xs text-slate-300 leading-relaxed">${item.text}</div>
            </div>
            <span class="flex-shrink-0 text-xs text-slate-500 whitespace-nowrap">${timeAgo(item.time)}</span>
          </div>
        `;
      }).join('');
    }

    // ========================================================================
    // Rendering: Student Table
    // ========================================================================
    function renderStudentTable() {
      const tbody = document.getElementById('studentTableBody');
      const search = (document.getElementById('studentSearch').value || '').toLowerCase();

      let students = state.students || [];
      if (search) {
        students = students.filter(s =>
          (s.name || '').toLowerCase().includes(search) ||
          (s.email || '').toLowerCase().includes(search)
        );
      }

      document.getElementById('studentCount').textContent = `총 ${students.length}명`;

      if (students.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-slate-500">학생이 없습니다</td></tr>';
        return;
      }

      tbody.innerHTML = students.map(s => {
        const pending = s.assignments?.pending ?? 0;
        const submitted = s.assignments?.submitted ?? 0;
        const graded = s.assignments?.graded ?? 0;
        const rate = s.attendance_rate;
        const ptfs = s.portfolio_count ?? 0;
        const classes = s.classes || [];
        const isExpanded = state.expandedStudent === s.id;

        return `
          <tr class="student-row border-b border-slate-700/50 ${isExpanded ? 'bg-slate-800' : ''}"

              <span class="${typeof rate === 'number' ? (rate >= 80 ? 'text-emerald-400' : rate >= 60 ? 'text-yellow-400' : 'text-red-400') : 'text-slate-500'} font-semibold">

      if (state.expandedStudent === studentId) {
        state.expandedStudent = null;
        renderStudentTable();
        return;
      }

      state.expandedStudent = studentId;

      if (!state.studentDetails[studentId]) {
        renderStudentTable();
        await fetchStudentDetail(studentId);
      }

      renderStudentTable();
    }

    function switchTab(event, studentId, tabName) {
      const parent = event.target.parentElement;
      parent.querySelectorAll('button').forEach(btn => {
        btn.className = 'tab-inactive pb-2 px-1 font-medium';
      });
      event.target.className = 'tab-active pb-2 px-1 font-medium';

      const allTabs = ['assignments', 'attendance', 'diet', 'portfolios', 'evaluations'];
      allTabs.forEach(t => {
        const el = document.getElementById(`tab-${studentId}-${t}`);
        if (el) el.classList.toggle('hidden', t !== tabName);
      });
    }

    // ========================================================================

    function renderInviteCodes() {
      const tbody = document.getElementById('inviteTableBody');
      const roleFilter = document.getElementById('inviteRoleFilter').value;
      const usedFilter = document.getElementById('inviteUsedFilter').value;

      let codes = state.inviteCodes || [];
      if (roleFilter) codes = codes.filter(c => c.role === roleFilter);
      if (usedFilter === 'used') codes = codes.filter(c => c.used);
      if (usedFilter === 'unused') codes = codes.filter(c => !c.used);

      document.getElementById('inviteCount').textContent = `총 ${codes.length}개`;

      if (codes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-slate-500">초대 코드가 없습니다</td></tr>';
        return;

      const roleLabels = { student: '수강생', teacher: '강사', director: '원장' };
      const roleColors = {
        student: 'bg-sky-900/50 text-sky-300',
        teacher: 'bg-violet-900/50 text-violet-300',
        director: 'bg-amber-900/50 text-amber-300',
      };

      tbody.innerHTML = codes.map(c => `
        <tr class="border-b border-slate-700/50 hover:bg-slate-700/30">
          <td class="px-4 py-3">

          </td>
          <td class="px-4 py-3 text-center">

              ${roleLabels[c.role] || c.role}
            </span>
          </td>
          <td class="px-4 py-3 text-center">
            ${c.used
              ? '<span class="text-xs px-2 py-0.5 rounded bg-slate-700 text-slate-400">사용됨</span>'
              : '<span class="text-xs px-2 py-0.5 rounded bg-emerald-900/50 text-emerald-300">미사용</span>'

          <td class="px-4 py-3 text-slate-400 text-xs">${esc(c.used_by || '-')}</td>

    // ========================================================================
    // Utility Helpers
    // ========================================================================
    function esc(str) {
      if (str === null || str === undefined) return '';
      const div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return `${diff}초 전`;
      if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
      if (diff < 604800) return `${Math.floor(diff / 86400)}일 전`;
      return d.toLocaleDateString('ko-KR');
    }

    function formatDateTime(dateStr) {
      if (!dateStr) return '--';
      const d = new Date(dateStr);
      return d.toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function formatDate(dateStr) {
      if (!dateStr) return '--';
      const d = new Date(dateStr);
      return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
    }

    function activityIcon(type) {
      const icons = {
        'assignment-submit': ['&#9997;', 'text-sky-400'],
        'assignment-grade': ['&#10003;', 'text-emerald-400'],
        'assignment-new': ['&#43;', 'text-yellow-400'],
        'journal': ['&#128221;', 'text-violet-400'],
        'portfolio': ['&#127909;', 'text-pink-400'],
        'attendance': ['&#128203;', 'text-emerald-400'],
        'diet': ['&#127860;', 'text-amber-400'],
        'evaluation': ['&#128200;', 'text-cyan-400'],
      };
      return icons[type] || ['&#8226;', 'text-slate-400'];
    }

    function statusKo(status) {
      const map = { pending: '대기', submitted: '제출', graded: '채점완료' };
      return map[status] || status;
    }

    function mealTypeKo(type) {
      const map = { breakfast: '아침', lunch: '점심', dinner: '저녁', snack: '간식' };
      return map[type] || type || '-';
    }

    function subjectKo(subject) {
      const map = { acting: '연기', musical: '뮤지컬', dance: '무용' };
      return map[subject] || subject || '-';
    }

    function attendanceStatusBadge(status) {
      const map = {
        present: ['출석', 'bg-emerald-900/50 text-emerald-300'],
        late: ['지각', 'bg-yellow-900/50 text-yellow-300'],
        absent: ['결석', 'bg-red-900/50 text-red-300'],
        excused: ['공결', 'bg-slate-700 text-slate-300'],
      };
      const [label, cls] = map[status] || [status, 'bg-slate-700 text-slate-400'];
      return `<span class="text-xs px-2 py-0.5 rounded ${cls}">${label}</span>`;
    }

    function categoryKo(cat) {
      const map = { monologue: '독백', scene: '씬', improv: '즉흥', audition_prep: '오디션 준비', other: '기타' };
      return map[cat] || cat || '-';
    }

    function formatTimestamp(sec) {
      if (sec == null) return '';
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function scoreCell(val) {
      if (val === null || val === undefined) return '<span class="text-slate-600">-</span>';
      const n = Number(val);
      let color = 'text-slate-300';
      if (n >= 9) color = 'text-emerald-400';
      else if (n >= 7) color = 'text-sky-400';
      else if (n >= 5) color = 'text-yellow-400';
      else color = 'text-red-400';
      return `<span class="${color} font-semibold">${n}</span>`;
    }

    // ========================================================================
    // Refresh Logic
    // ========================================================================
    async function refreshAll() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.innerHTML = `
        <svg class="w-3.5 h-3.5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        로딩 중...
      `;

      try {
        await fetchAllData();
        const page = state.currentPage;
        if (page === 'dashboard') { renderStats(); renderActivityFeed('activityFeedDash'); }
        if (page === 'students') renderStudentTable();
        if (page === 'activity') renderActivityFeed('activityFeedFull');
        if (page === 'invites') renderInviteCodes();

        const now = new Date();
        document.getElementById('lastRefresh').textContent =
          `마지막 갱신: ${now.toLocaleTimeString('ko-KR')}`;
      } catch (err) {
        console.error('[Refresh]', err);
      } finally {
        btn.disabled = false;
        btn.innerHTML = `
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          새로고침
        `;
      }
    }

    function startAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => refreshAll(), REFRESH_INTERVAL);
    }

    // ========================================================================
    // Slideshow / Idle Detection
    // ========================================================================
    const IDLE_TIMEOUT = 30000;
    const SLIDE_INTERVAL = 8000;
    const TOTAL_SLIDES = 3;

    function resetIdle() {
      clearTimeout(state.idleTimer);
      if (state.slideshowActive) stopSlideshow();
      state.idleTimer = setTimeout(startSlideshow, IDLE_TIMEOUT);
    }

    function startSlideshow() {
      if (state.slideshowActive) return;
      state.slideshowActive = true;
      state.slideshowStep = 0;

      const overlay = document.getElementById('slideshowOverlay');
      const badge = document.getElementById('autoBadge');
      overlay.classList.add('active');
      badge.classList.add('visible');
      showSlide(0);

      state.slideshowTimer = setInterval(() => {
        state.slideshowStep = (state.slideshowStep + 1) % TOTAL_SLIDES;
        showSlide(state.slideshowStep);
      }, SLIDE_INTERVAL);
    }

    function stopSlideshow() {
      state.slideshowActive = false;
      clearInterval(state.slideshowTimer);
      state.slideshowTimer = null;

      const overlay = document.getElementById('slideshowOverlay');
      const badge = document.getElementById('autoBadge');
      overlay.classList.add('fade-out');
      badge.classList.remove('visible');

      setTimeout(() => {
        overlay.classList.remove('active', 'fade-out');
        for (let i = 0; i < TOTAL_SLIDES; i++) {
          document.getElementById('ssSlide' + i).classList.remove('visible');
        }
      }, 600);
    }

    function showSlide(index) {
      for (let i = 0; i < TOTAL_SLIDES; i++) {
        document.getElementById('ssSlide' + i).classList.remove('visible');
      }
      if (index === 0) populateSSStats();
      else if (index === 1) populateSSFeed();
      else if (index === 2) populateSSStudent();
      setTimeout(() => {
        document.getElementById('ssSlide' + index).classList.add('visible');
      }, 50);
    }

    function populateSSStats() {
      const s = state.stats;
      if (!s) return;
      const items = [
        { label: '학생 수', value: s.students ?? '--', color: 'color:#38bdf8' },
        { label: '강사 수', value: s.teachers ?? '--', color: 'color:#a78bfa' },
        { label: '전체 수업', value: s.lessons_total ?? '--', color: 'color:#4ade80' },
        { label: '미완료 과제', value: s.assignments_pending ?? '--', color: 'color:#fbbf24' },
        { label: '제출 과제', value: s.assignments_submitted ?? '--', color: 'color:#38bdf8' },
        { label: '채점 완료', value: s.assignments_graded ?? '--', color: 'color:#4ade80' },
        { label: '포트폴리오', value: s.portfolios ?? '--', color: 'color:#f472b6' },
        { label: '원장', value: s.directors ?? '--', color: 'color:#fbbf24' },
      ];
      document.getElementById('ssStatsGrid').innerHTML = items.map(it => `
        <div class="ss-stat-card">
          <div class="ss-stat-label">${it.label}</div>
          <div class="ss-stat-value" style="${it.color}">${it.value}</div>
        </div>
      `).join('');
    }

    function populateSSFeed() {
      const items = (state.activity || []).slice(0, 10);
      const list = document.getElementById('ssFeedList');
      if (items.length === 0) {
        list.innerHTML = '<div class="text-slate-500 text-center py-8">활동 내역이 없습니다</div>';
        return;
      }
      list.innerHTML = items.map((item, idx) => {
        const [icon, iconColor] = activityIcon(item.type);
        return `
          <div class="ss-feed-item" style="transition-delay:${idx * 0.15}s">
            <span class="${iconColor}" style="margin-right:8px">${icon}</span>
            <span class="text-sm text-slate-300">${item.text}</span>
            <span class="text-xs text-slate-500 float-right">${timeAgo(item.time)}</span>
          </div>
        `;
      }).join('');
      requestAnimationFrame(() => {
        list.querySelectorAll('.ss-feed-item').forEach(el => el.classList.add('shown'));
      });
    }

    function populateSSStudent() {
      const students = state.students || [];
      if (students.length === 0) {
        document.getElementById('ssStudentCard').innerHTML =
          '<div class="text-slate-500 py-8">학생 데이터 없음</div>';
        return;
      }
      const idx = state.studentSpotlightIndex % students.length;
      const s = students[idx];
      state.studentSpotlightIndex = idx + 1;

      const pending = s.assignments?.pending ?? 0;
      const submitted = s.assignments?.submitted ?? 0;
      const graded = s.assignments?.graded ?? 0;
      const rate = s.attendance_rate;
      const ptfs = s.portfolio_count ?? 0;
      const classes = (s.classes || []).join(', ') || '-';

      document.getElementById('ssStudentCard').innerHTML = `
        <div class="ss-student-name">${esc(s.name)}</div>
        <div class="text-sm text-slate-400 mb-6">${esc(s.email)} &middot; ${classes}</div>
        <div class="ss-student-meta">
          <div class="ss-meta-item">
            <div class="ss-meta-label">대기 과제</div>
            <div class="ss-meta-value" style="color:#fbbf24">${pending}</div>
          </div>
          <div class="ss-meta-item">
            <div class="ss-meta-label">제출 과제</div>
            <div class="ss-meta-value" style="color:#38bdf8">${submitted}</div>
          </div>
          <div class="ss-meta-item">
            <div class="ss-meta-label">채점 완료</div>
            <div class="ss-meta-value" style="color:#4ade80">${graded}</div>
          </div>
          <div class="ss-meta-item">
            <div class="ss-meta-label">출석률</div>
            <div class="ss-meta-value" style="color:${typeof rate === 'number' ? (rate >= 80 ? '#4ade80' : rate >= 60 ? '#fbbf24' : '#f87171') : '#64748b'}">
              ${typeof rate === 'number' ? rate + '%' : '--'}
            </div>
          </div>
          <div class="ss-meta-item">
            <div class="ss-meta-label">포트폴리오</div>
            <div class="ss-meta-value" style="color:#f472b6">${ptfs}</div>
          </div>
          <div class="ss-meta-item">
            <div class="ss-meta-label">반</div>
            <div class="ss-meta-value text-lg" style="color:#94a3b8">${classes}</div>
          </div>
        </div>
      `;
    }

    function initIdleTracking() {
      document.addEventListener('mousemove', resetIdle);
      document.addEventListener('keydown', resetIdle);
      document.addEventListener('click', resetIdle);
      state.idleTimer = setTimeout(startSlideshow, IDLE_TIMEOUT);
    }

    // ========================================================================
    // Init
    // ========================================================================
    async function init() {
      await fetchAllData();
      renderStats();
      renderActivityFeed('activityFeedDash');
      const now = new Date();
      document.getElementById('lastRefresh').textContent =
        `마지막 갱신: ${now.toLocaleTimeString('ko-KR')}`;
      startAutoRefresh();
      initIdleTracking();
    }

    init();
  </script>
</body>
</html>
