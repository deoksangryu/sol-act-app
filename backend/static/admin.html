<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOL-ACT 관리자 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"JetBrains Mono"', '"Fira Code"', 'Consolas', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; }
    body { background: #0f172a; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .stat-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .feed-item { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .student-row { cursor: pointer; transition: background 0.15s ease; }
    .student-row:hover { background: #1e293b !important; }
    .expand-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .expand-content.open { max-height: 2000px; }
    .status-pending { color: #fbbf24; }
    .status-submitted { color: #38bdf8; }
    .status-graded { color: #4ade80; }
    table { border-collapse: separate; border-spacing: 0; }
    .tab-active { border-bottom: 2px solid #38bdf8; color: #38bdf8; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #94a3b8; }
    .tab-inactive:hover { color: #cbd5e1; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Top Bar -->
  <header class="sticky top-0 z-40 bg-slate-900/95 border-b border-slate-700 backdrop-blur">
    <div class="max-w-[1920px] mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-2 h-2 rounded-full bg-emerald-400 pulse-dot"></div>
        <h1 class="text-lg font-bold text-slate-100 tracking-tight">SOL-ACT 관리자 대시보드</h1>
        <span class="text-xs px-2 py-0.5 rounded bg-emerald-900 text-emerald-300 border border-emerald-700">No-Auth Mode</span>
      </div>
      <div class="flex items-center gap-4">
        <span id="lastRefresh" class="text-xs text-slate-500">--</span>
        <button onclick="refreshAll()" id="refreshBtn"
          class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 border border-slate-600 rounded text-xs text-slate-300 transition-colors flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          새로고침
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-[1920px] mx-auto px-4 py-6 space-y-6">

    <!-- Section 1: Summary Stats -->
    <section>
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">학원 전체 통계</h2>
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-7 gap-3">
        <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
          <div class="text-xs text-slate-500 mb-1">학생 수</div>
          <div id="statStudents" class="text-2xl font-bold text-sky-400">--</div>
        </div>
        <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
          <div class="text-xs text-slate-500 mb-1">강사 수</div>
          <div id="statTeachers" class="text-2xl font-bold text-violet-400">--</div>
        </div>
        <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
          <div class="text-xs text-slate-500 mb-1">원장</div>
          <div id="statDirectors" class="text-2xl font-bold text-amber-400">--</div>
        </div>
        <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
          <div class="text-xs text-slate-500 mb-1">전체 수업</div>
          <div id="statLessons" class="text-2xl font-bold text-emerald-400">--</div>
        </div>
        <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
          <div class="text-xs text-slate-500 mb-1">미완료 과제</div>
          <div id="statPending" class="text-2xl font-bold text-yellow-400">--</div>
        </div>
        <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
          <div class="text-xs text-slate-500 mb-1">제출 과제</div>
          <div id="statSubmitted" class="text-2xl font-bold text-sky-300">--</div>
        </div>
        <div class="stat-card bg-slate-800 border border-slate-700 rounded-lg p-4">
          <div class="text-xs text-slate-500 mb-1">포트폴리오</div>
          <div id="statPortfolios" class="text-2xl font-bold text-pink-400">--</div>
        </div>
      </div>
    </section>

    <!-- Section 2: Activity Feed -->
    <section>
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">실시간 활동 피드</h2>
      <div class="bg-slate-800 border border-slate-700 rounded-lg">
        <div id="activityFeed" class="max-h-80 overflow-y-auto p-4 space-y-2">
          <div class="text-sm text-slate-500 text-center py-8">데이터를 불러오는 중...</div>
        </div>
      </div>
    </section>

    <!-- Section 3: Student Detail Table -->
    <section>
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">학생별 상세 현황</h2>
        <div class="flex items-center gap-2">
          <input id="studentSearch" type="text" placeholder="이름 검색..."
            oninput="filterStudents()"
            class="px-3 py-1.5 bg-slate-900 border border-slate-600 rounded text-xs text-slate-300 focus:outline-none focus:border-sky-500 w-48">
          <span id="studentCount" class="text-xs text-slate-500"></span>
        </div>
      </div>
      <div class="bg-slate-800 border border-slate-700 rounded-lg overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-xs">
            <thead>
              <tr class="bg-slate-900 text-slate-400 uppercase tracking-wider">
                <th class="px-4 py-3 text-left font-medium">이름</th>
                <th class="px-4 py-3 text-left font-medium">이메일</th>
                <th class="px-4 py-3 text-left font-medium">반</th>
                <th class="px-4 py-3 text-center font-medium">과제(대기)</th>
                <th class="px-4 py-3 text-center font-medium">과제(제출)</th>
                <th class="px-4 py-3 text-center font-medium">과제(채점)</th>
                <th class="px-4 py-3 text-center font-medium">출석률</th>
                <th class="px-4 py-3 text-center font-medium">포트폴리오</th>
              </tr>
            </thead>
            <tbody id="studentTableBody">
              <tr><td colspan="8" class="px-4 py-8 text-center text-slate-500">데이터를 불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <footer class="max-w-[1920px] mx-auto px-4 py-4 text-center text-xs text-slate-600 border-t border-slate-800">
    SOL-ACT Admin Dashboard &mdash; Local Access Only &mdash; localhost:8000
  </footer>

  <script>
    // ========================================================================
    // Configuration
    // ========================================================================
    const BASE_URL = '';
    const REFRESH_INTERVAL = 30000; // 30 seconds
    let refreshTimer = null;

    // ========================================================================
    // State
    // ========================================================================
    let state = {
      stats: null,
      students: [],
      activity: [],
      expandedStudent: null,
      studentDetails: {}, // cache: { [studentId]: detailData }
    };

    // ========================================================================
    // API Helpers (no auth)
    // ========================================================================
    async function apiFetch(path) {
      try {
        const res = await fetch(`${BASE_URL}${path}`);
        if (!res.ok) throw new Error(`API error ${res.status}`);
        return await res.json();
      } catch (err) {
        console.error(`[API] ${path}:`, err.message);
        return null;
      }
    }

    // ========================================================================
    // Data Fetching
    // ========================================================================
    async function fetchAllData() {
      const [stats, students, activity] = await Promise.all([
        apiFetch('/api/admin/stats'),
        apiFetch('/api/admin/students'),
        apiFetch('/api/admin/activity'),
      ]);

      if (stats) state.stats = stats;
      if (students) state.students = students;
      if (activity) state.activity = activity;
    }

    async function fetchStudentDetail(studentId) {
      const data = await apiFetch(`/api/admin/students/${studentId}`);
      if (data) {
        state.studentDetails[studentId] = data;
      }
      return data;
    }

    // ========================================================================
    // Rendering
    // ========================================================================
    function renderStats() {
      if (!state.stats) return;
      const s = state.stats;
      document.getElementById('statStudents').textContent = s.students ?? '--';
      document.getElementById('statTeachers').textContent = s.teachers ?? '--';
      document.getElementById('statDirectors').textContent = s.directors ?? '--';
      document.getElementById('statLessons').textContent = s.lessons_total ?? '--';
      document.getElementById('statPending').textContent = s.assignments_pending ?? '--';
      document.getElementById('statSubmitted').textContent = s.assignments_submitted ?? '--';
      document.getElementById('statPortfolios').textContent = s.portfolios ?? '--';
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return `${diff}초 전`;
      if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
      if (diff < 604800) return `${Math.floor(diff / 86400)}일 전`;
      return d.toLocaleDateString('ko-KR');
    }

    function formatDateTime(dateStr) {
      if (!dateStr) return '--';
      const d = new Date(dateStr);
      return d.toLocaleString('ko-KR', {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    }

    function formatDate(dateStr) {
      if (!dateStr) return '--';
      const d = new Date(dateStr);
      return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
    }

    function activityIcon(type) {
      const icons = {
        'assignment-submit': ['&#9997;', 'text-sky-400'],
        'assignment-grade': ['&#10003;', 'text-emerald-400'],
        'assignment-new': ['&#43;', 'text-yellow-400'],
        'journal': ['&#128221;', 'text-violet-400'],
        'portfolio': ['&#127909;', 'text-pink-400'],
        'attendance': ['&#128203;', 'text-emerald-400'],
        'diet': ['&#127860;', 'text-amber-400'],
        'evaluation': ['&#128200;', 'text-cyan-400'],
      };
      return icons[type] || ['&#8226;', 'text-slate-400'];
    }

    function renderActivityFeed() {
      const feed = document.getElementById('activityFeed');
      const items = state.activity || [];

      if (items.length === 0) {
        feed.innerHTML = '<div class="text-sm text-slate-500 text-center py-8">활동 내역이 없습니다</div>';
        return;
      }

      feed.innerHTML = items.map(item => {
        const [icon, iconColor] = activityIcon(item.type);
        return `
          <div class="feed-item flex items-start gap-3 py-2 px-2 rounded hover:bg-slate-700/50">
            <span class="flex-shrink-0 w-5 text-center ${iconColor}">${icon}</span>
            <div class="flex-1 min-w-0">
              <div class="text-xs text-slate-300 leading-relaxed">${item.text}</div>
            </div>
            <span class="flex-shrink-0 text-xs text-slate-500 whitespace-nowrap">${timeAgo(item.time)}</span>
          </div>
        `;
      }).join('');
    }

    function renderStudentTable() {
      const tbody = document.getElementById('studentTableBody');
      const search = (document.getElementById('studentSearch').value || '').toLowerCase();

      let students = state.students || [];
      if (search) {
        students = students.filter(s =>
          (s.name || '').toLowerCase().includes(search) ||
          (s.email || '').toLowerCase().includes(search)
        );
      }

      document.getElementById('studentCount').textContent = `총 ${students.length}명`;

      if (students.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-slate-500">학생이 없습니다</td></tr>';
        return;
      }

      tbody.innerHTML = students.map(s => {
        const pending = s.assignments?.pending ?? 0;
        const submitted = s.assignments?.submitted ?? 0;
        const graded = s.assignments?.graded ?? 0;
        const rate = s.attendance_rate;
        const ptfs = s.portfolio_count ?? 0;
        const classes = s.classes || [];
        const isExpanded = state.expandedStudent === s.id;

        return `
          <tr class="student-row border-b border-slate-700/50 ${isExpanded ? 'bg-slate-750' : ''}"
              onclick="toggleStudentDetail('${s.id}')">
            <td class="px-4 py-3 text-slate-200 font-medium">${esc(s.name)}</td>
            <td class="px-4 py-3 text-slate-400">${esc(s.email)}</td>
            <td class="px-4 py-3 text-slate-400">${classes.length > 0 ? classes.map(c => `<span class="inline-block px-1.5 py-0.5 bg-slate-700 rounded text-xs mr-1">${esc(c)}</span>`).join('') : '<span class="text-slate-600">-</span>'}</td>
            <td class="px-4 py-3 text-center"><span class="status-pending font-semibold">${pending}</span></td>
            <td class="px-4 py-3 text-center"><span class="status-submitted font-semibold">${submitted}</span></td>
            <td class="px-4 py-3 text-center"><span class="status-graded font-semibold">${graded}</span></td>
            <td class="px-4 py-3 text-center">
              <span class="${typeof rate === 'number' ? (rate >= 80 ? 'text-emerald-400' : rate >= 60 ? 'text-yellow-400' : 'text-red-400') : 'text-slate-500'} font-semibold">
                ${typeof rate === 'number' ? rate + '%' : '--'}
              </span>
            </td>
            <td class="px-4 py-3 text-center text-pink-400 font-semibold">${ptfs}</td>
          </tr>
          <tr id="detail-${s.id}" class="${isExpanded ? '' : 'hidden'}">
            <td colspan="8" class="p-0">
              <div class="bg-slate-900/50 border-t border-slate-700 px-6 py-4">
                ${isExpanded ? renderStudentDetail(s.id) : ''}
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function toggleStudentDetail(studentId) {
      if (state.expandedStudent === studentId) {
        state.expandedStudent = null;
        renderStudentTable();
        return;
      }

      state.expandedStudent = studentId;

      // Fetch detail data if not cached
      if (!state.studentDetails[studentId]) {
        // Show loading state
        renderStudentTable();
        await fetchStudentDetail(studentId);
      }

      renderStudentTable();
    }

    function renderStudentDetail(studentId) {
      const detail = state.studentDetails[studentId];
      if (!detail) return '<div class="text-xs text-slate-500 py-2">데이터를 불러오는 중...</div>';

      const assigns = detail.assignments || [];
      const diets = detail.diets || [];
      const ptfs = detail.portfolios || [];
      const evals = detail.evaluations || [];
      const atts = detail.attendances || [];

      return `
        <div class="space-y-4">
          <!-- Sub-tabs -->
          <div class="flex gap-4 border-b border-slate-700 pb-0 text-xs">
            <button class="tab-active pb-2 px-1 font-medium" onclick="event.stopPropagation(); switchTab(event, '${studentId}', 'assignments')">과제 (${assigns.length})</button>
            <button class="tab-inactive pb-2 px-1 font-medium" onclick="event.stopPropagation(); switchTab(event, '${studentId}', 'attendance')">출석 (${atts.length})</button>
            <button class="tab-inactive pb-2 px-1 font-medium" onclick="event.stopPropagation(); switchTab(event, '${studentId}', 'diet')">식단 (${diets.length})</button>
            <button class="tab-inactive pb-2 px-1 font-medium" onclick="event.stopPropagation(); switchTab(event, '${studentId}', 'portfolios')">포트폴리오 (${ptfs.length})</button>
            <button class="tab-inactive pb-2 px-1 font-medium" onclick="event.stopPropagation(); switchTab(event, '${studentId}', 'evaluations')">평가 (${evals.length})</button>
          </div>

          <!-- Assignments Tab -->
          <div id="tab-${studentId}-assignments" class="tab-content">
            ${assigns.length === 0 ? '<div class="text-xs text-slate-500 py-2">과제 없음</div>' : `
              <table class="w-full text-xs">
                <thead><tr class="text-slate-500">
                  <th class="text-left pb-2 font-medium">제목</th>
                  <th class="text-center pb-2 font-medium">상태</th>
                  <th class="text-center pb-2 font-medium">등급</th>
                  <th class="text-left pb-2 font-medium">마감일</th>
                  <th class="text-left pb-2 font-medium">피드백</th>
                </tr></thead>
                <tbody>
                  ${assigns.map(a => `
                    <tr class="border-t border-slate-700/30">
                      <td class="py-2 text-slate-300">${esc(a.title)}</td>
                      <td class="py-2 text-center"><span class="status-${a.status} text-xs px-2 py-0.5 rounded bg-slate-800">${statusKo(a.status)}</span></td>
                      <td class="py-2 text-center text-slate-300">${a.grade || '-'}</td>
                      <td class="py-2 text-slate-400">${formatDate(a.due_date)}</td>
                      <td class="py-2 text-slate-400 max-w-xs truncate">${esc(a.feedback || '-')}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            `}
          </div>

          <!-- Attendance Tab -->
          <div id="tab-${studentId}-attendance" class="tab-content hidden">
            ${atts.length === 0 ? '<div class="text-xs text-slate-500 py-2">출석 기록 없음</div>' : `
              <table class="w-full text-xs">
                <thead><tr class="text-slate-500">
                  <th class="text-left pb-2 font-medium">수업</th>
                  <th class="text-center pb-2 font-medium">상태</th>
                  <th class="text-left pb-2 font-medium">비고</th>
                  <th class="text-left pb-2 font-medium">기록일</th>
                </tr></thead>
                <tbody>
                  ${atts.slice(0, 20).map(a => `
                    <tr class="border-t border-slate-700/30">
                      <td class="py-2 text-slate-300">${esc(a.lesson_id || '-')}</td>
                      <td class="py-2 text-center">${attendanceStatusBadge(a.status)}</td>
                      <td class="py-2 text-slate-400">${esc(a.note || '-')}</td>
                      <td class="py-2 text-slate-400">${formatDateTime(a.created_at)}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            `}
          </div>

          <!-- Diet Tab -->
          <div id="tab-${studentId}-diet" class="tab-content hidden">
            ${diets.length === 0 ? '<div class="text-xs text-slate-500 py-2">식단 기록 없음</div>' : `
              <table class="w-full text-xs">
                <thead><tr class="text-slate-500">
                  <th class="text-left pb-2 font-medium">날짜</th>
                  <th class="text-left pb-2 font-medium">식사</th>
                  <th class="text-left pb-2 font-medium">설명</th>
                  <th class="text-center pb-2 font-medium">칼로리</th>
                  <th class="text-left pb-2 font-medium">AI 조언</th>
                </tr></thead>
                <tbody>
                  ${diets.slice(0, 20).map(d => `
                    <tr class="border-t border-slate-700/30">
                      <td class="py-2 text-slate-400">${formatDate(d.date)}</td>
                      <td class="py-2 text-slate-300">${mealTypeKo(d.meal_type)}</td>
                      <td class="py-2 text-slate-300 max-w-xs truncate">${esc(d.description || '-')}</td>
                      <td class="py-2 text-center text-amber-400">${d.calories || '-'}</td>
                      <td class="py-2 text-slate-400 max-w-xs truncate">${esc(d.ai_advice || '-')}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            `}
          </div>

          <!-- Portfolios Tab -->
          <div id="tab-${studentId}-portfolios" class="tab-content hidden">
            ${ptfs.length === 0 ? '<div class="text-xs text-slate-500 py-2">포트폴리오 없음</div>' : `
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                ${ptfs.map(p => `
                  <div class="bg-slate-800 border border-slate-700 rounded p-3">
                    <div class="text-sm font-medium text-slate-200 mb-1">${esc(p.title)}</div>
                    <div class="text-xs text-slate-400 mb-2 line-clamp-2">${esc(p.description || '')}</div>
                    <div class="flex items-center justify-between">
                      <span class="text-xs px-1.5 py-0.5 rounded bg-pink-900/50 text-pink-300">${esc(p.category || '-')}</span>
                      <span class="text-xs text-slate-500">${formatDate(p.created_at)}</span>
                    </div>
                    ${p.tags && p.tags.length > 0 ? `
                      <div class="mt-2 flex flex-wrap gap-1">
                        ${p.tags.map(t => `<span class="text-xs px-1 py-0.5 bg-slate-700 rounded text-slate-400">${esc(t)}</span>`).join('')}
                      </div>
                    ` : ''}
                    ${p.video_url ? `<a href="${esc(p.video_url)}" target="_blank" class="inline-block mt-2 text-xs text-sky-400 hover:text-sky-300">&#9654; 영상 보기</a>` : ''}
                    ${p.comments && p.comments.length > 0 ? `
                      <div class="mt-2 pt-2 border-t border-slate-700">
                        <div class="text-xs text-slate-500 mb-1">댓글 (${p.comments.length})</div>
                        ${p.comments.slice(0, 3).map(c => `
                          <div class="text-xs text-slate-400 mb-1"><span class="text-slate-300">${esc(c.author_name)}</span>: ${esc(c.content)}</div>
                        `).join('')}
                      </div>
                    ` : ''}
                  </div>
                `).join('')}
              </div>
            `}
          </div>

          <!-- Evaluations Tab -->
          <div id="tab-${studentId}-evaluations" class="tab-content hidden">
            ${evals.length === 0 ? '<div class="text-xs text-slate-500 py-2">평가 없음</div>' : `
              <table class="w-full text-xs">
                <thead><tr class="text-slate-500">
                  <th class="text-left pb-2 font-medium">기간</th>
                  <th class="text-left pb-2 font-medium">반</th>
                  <th class="text-left pb-2 font-medium">과목</th>
                  <th class="text-center pb-2 font-medium">연기</th>
                  <th class="text-center pb-2 font-medium">표현</th>
                  <th class="text-center pb-2 font-medium">창의</th>
                  <th class="text-center pb-2 font-medium">협동</th>
                  <th class="text-center pb-2 font-medium">노력</th>
                  <th class="text-left pb-2 font-medium">코멘트</th>
                </tr></thead>
                <tbody>
                  ${evals.map(e => `
                    <tr class="border-t border-slate-700/30">
                      <td class="py-2 text-slate-300">${esc(e.period || '-')}</td>
                      <td class="py-2 text-slate-400">${esc(e.class_name || '-')}</td>
                      <td class="py-2 text-slate-400">${subjectKo(e.subject)}</td>
                      <td class="py-2 text-center">${scoreCell(e.scores?.acting)}</td>
                      <td class="py-2 text-center">${scoreCell(e.scores?.expression)}</td>
                      <td class="py-2 text-center">${scoreCell(e.scores?.creativity)}</td>
                      <td class="py-2 text-center">${scoreCell(e.scores?.teamwork)}</td>
                      <td class="py-2 text-center">${scoreCell(e.scores?.effort)}</td>
                      <td class="py-2 text-slate-400 max-w-xs truncate">${esc(e.comment || '-')}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            `}
          </div>
        </div>
      `;
    }

    function switchTab(event, studentId, tabName) {
      // Update tab buttons
      const parent = event.target.parentElement;
      parent.querySelectorAll('button').forEach(btn => {
        btn.className = 'tab-inactive pb-2 px-1 font-medium';
      });
      event.target.className = 'tab-active pb-2 px-1 font-medium';

      // Show/hide content
      const allTabs = ['assignments', 'attendance', 'diet', 'portfolios', 'evaluations'];
      allTabs.forEach(t => {
        const el = document.getElementById(`tab-${studentId}-${t}`);
        if (el) el.classList.toggle('hidden', t !== tabName);
      });
    }

    // ========================================================================
    // Utility Helpers
    // ========================================================================
    function esc(str) {
      if (str === null || str === undefined) return '';
      const div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }

    function statusKo(status) {
      const map = { pending: '대기', submitted: '제출', graded: '채점완료' };
      return map[status] || status;
    }

    function mealTypeKo(type) {
      const map = { breakfast: '아침', lunch: '점심', dinner: '저녁', snack: '간식' };
      return map[type] || type || '-';
    }

    function subjectKo(subject) {
      const map = { acting: '연기', musical: '뮤지컬', dance: '무용' };
      return map[subject] || subject || '-';
    }

    function attendanceStatusBadge(status) {
      const map = {
        present: ['출석', 'bg-emerald-900/50 text-emerald-300'],
        late: ['지각', 'bg-yellow-900/50 text-yellow-300'],
        absent: ['결석', 'bg-red-900/50 text-red-300'],
        excused: ['공결', 'bg-slate-700 text-slate-300'],
      };
      const [label, cls] = map[status] || [status, 'bg-slate-700 text-slate-400'];
      return `<span class="text-xs px-2 py-0.5 rounded ${cls}">${label}</span>`;
    }

    function scoreCell(val) {
      if (val === null || val === undefined) return '<span class="text-slate-600">-</span>';
      const n = Number(val);
      let color = 'text-slate-300';
      if (n >= 9) color = 'text-emerald-400';
      else if (n >= 7) color = 'text-sky-400';
      else if (n >= 5) color = 'text-yellow-400';
      else color = 'text-red-400';
      return `<span class="${color} font-semibold">${n}</span>`;
    }

    function filterStudents() {
      renderStudentTable();
    }

    // ========================================================================
    // Refresh Logic
    // ========================================================================
    async function refreshAll() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.innerHTML = `
        <svg class="w-3.5 h-3.5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        로딩 중...
      `;

      try {
        await fetchAllData();
        renderStats();
        renderActivityFeed();
        renderStudentTable();

        const now = new Date();
        document.getElementById('lastRefresh').textContent =
          `마지막 갱신: ${now.toLocaleTimeString('ko-KR')}`;
      } catch (err) {
        console.error('[Refresh]', err);
      } finally {
        btn.disabled = false;
        btn.innerHTML = `
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          새로고침
        `;
      }
    }

    function startAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => {
        refreshAll();
      }, REFRESH_INTERVAL);
    }

    // ========================================================================
    // Initialization
    // ========================================================================
    function init() {
      refreshAll();
      startAutoRefresh();
    }

    // Start the app
    init();
  </script>
</body>
</html>
